name: Daily Stock News

on:
  schedule:
    - cron: "0 1 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm start
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_TICKERS: AAPL,MSFT,NVDA,AMZN,META,GOOGL,TSLA,JPM,AMD,NFLX,SPY,QQQ
          NEWS_LIMIT: 7
          ALPHA_TOPICS: financial_markets,earnings,economy_monetary,economy_macro,technology,energy_transportation
          ALPHA_NEWS_LIMIT: 50
